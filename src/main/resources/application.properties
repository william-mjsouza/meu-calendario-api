spring.application.name=meu-calendario-api

# --- PostgreSQL ---
# Valores sensíveis lidos do arquivo .env (via spring-dotenv) ou de variáveis do SO
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Servidor ---
# Render/Heroku definem PORT; localmente cai para 8080
server.port=${PORT:8080}

# --- JWT ---
# Segredo em Base64 — nunca deve ir para o Git
app.security.jwt.secret=${JWT_SECRET}
# Expiração em milissegundos (24h)
app.security.jwt.expiration=86400000

# Padrões de origem permitidos no CORS
# Local: localhost/127.0.0.1 em qualquer porta. Prod: definir FRONTEND_URL (ex.: https://meu-calendario.vercel.app)
app.security.cors.allowed-origins=${FRONTEND_URL:http://localhost:*},http://localhost:*,http://127.0.0.1:*
