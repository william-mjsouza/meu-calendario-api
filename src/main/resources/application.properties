spring.application.name=meu-calendario-api

# --- PostgreSQL ---
# Valores sensíveis lidos do arquivo .env (via spring-dotenv) ou de variáveis do SO
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Servidor ---
server.port=8080

# --- JWT ---
# Segredo em Base64 — nunca deve ir para o Git
app.security.jwt.secret=${JWT_SECRET}
# Expiração em milissegundos (24h)
app.security.jwt.expiration=86400000

# Padrões de origem permitidos no CORS (aceita qualquer porta em localhost/127.0.0.1)
app.security.cors.allowed-origins=http://localhost:*,http://127.0.0.1:*
